name: Governance Check

on:
  pull_request:
    paths:
      - 'resources/**'

jobs:
  validate:
    name: Validate resources against Nomos
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run governance validation
        run: python3 scripts/validate.py
        env:
          NOMOS_SERVER: https://nomos-f3vy.onrender.com
